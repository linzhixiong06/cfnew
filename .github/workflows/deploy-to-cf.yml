name: Auto Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - '少年你相信光吗'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 强行同步最新云端文件
      - name: Pull latest changes
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull origin main

      # 2. 🌟 核心绕坑：将无后缀的中文文件现场复制一份为标准的 worker.js，规避所有路径 Bug
      - name: Prepare Standard Script File
        run: |
          cp "少年你相信光吗" worker.js

      # 3. 🌟 核心绕坑：不再使用脆弱的官方 Action，直接用 Node 运行纯原生 Wrangler 命令部署
      - name: Deploy via Raw Wrangler Command
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler deploy worker.js --name=wx --compatibility-date=2026-01-20
